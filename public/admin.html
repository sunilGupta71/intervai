<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · IntervAI</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <h1>IntervAI · Admin</h1>
    </div>
    <div class="header-info">
      <a href="/" class="pill">← Home</a>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌓</button>
    </div>
  </header>

  <main class="results-view">
    <div class="hero-card admin-card">
      <h2>All Interviews</h2>
      <p class="lead">Review every candidate submission with their score and timestamp.</p>

      <div class="admin-summary">
        <div class="summary-tile"><div class="summary-num" id="totalCount">--</div><small>Interviews</small></div>
        <div class="summary-tile"><div class="summary-num" id="avgScore">--</div><small>Avg score</small></div>
        <div class="summary-tile"><div class="summary-num" id="topScore">--</div><small>Top score</small></div>
      </div>

      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Candidate</th>
              <th>Role</th>
              <th>Score</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="adminBody">
            <tr><td colspan="5" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/js/admin.js"></script>
</body>
</html>
